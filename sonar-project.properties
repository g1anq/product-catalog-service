# SonarQube Project Configuration for Product Catalog Service

# Project Identification
sonar.projectKey=product-catalog-service
sonar.projectName=Product Catalog Service
sonar.organization=g1anq
sonar.projectVersion=1.0.0

# Source Code Locations
sonar.sources=app
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Python Configuration
sonar.python.version=3.13
sonar.python.coverage.reportPaths=coverage.xml

# Code Coverage Settings
sonar.coverage.exclusions=**/*test*.py,**/tests/**,**/__pycache__/**

# Exclusions (files and folders to exclude from analysis)
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/.*/**,.venv/**,venv/**,**/*.pyc,**/node_modules/**

# Test Exclusions
sonar.test.exclusions=

# Import path for dependencies
sonar.import.unknown.files=true

# Performance Optimization
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
