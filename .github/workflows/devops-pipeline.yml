name: Product Catalog CI/CD

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # Task 2.1: Linting Stage
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Linting Tools
        run: pip install flake8
      - name: Run Flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # Task 2.2: Testing Stage
  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Đảm bảo cài thêm các gói test nếu requirements.txt chưa có
          pip install pytest pytest-cov requests pytest-asyncio 
      - name: Run Tests with Coverage
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/test_db
        run: |
          # Chạy uvicorn ở background nếu bạn test qua requests (BASE_URL)
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 & 
          sleep 5 # Đợi app lên
          pytest --cov=app --cov-report=xml --cov-report=term-missing
  # Task 2.3: Build Stage
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t product-catalog:${{ github.sha }} .
      - name: List Docker Images
        run: docker images